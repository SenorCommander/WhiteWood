- type: entity
  parent: [ClothingOuterStorageBase, ClothingOuterArmorHoS]
  id: ClothingOuterCoatGermanSschutzeGreen
  name: немецкая солдатская шинель
  description: Немецкая солдатская двубортная шинель из серо-зелёной шерстяной ткани. Поможет не замерзнуть насмерть.
  components:
  - type: Sprite
    sprite: Fractions/Clothing/German/OuterClothing/Coats/schutze_green.rsi
  - type: Clothing
    sprite: Fractions/Clothing/German/OuterClothing/Coats/schutze_green.rsi
  - type: TemperatureProtection
    heatingCoefficient: 0.1
    coolingCoefficient: 0.1
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.8
        Slash: 0.8
        Piercing: 0.8
        Heat: 0.5
        Caustic: 0.5
  - type: Food
    requiresSpecialDigestion: true
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 20
        reagents:
        - ReagentId: Fiber
          Quantity: 20

