  name: шлем M10
  suffix: ОПЗ
  description: Стандартный шлем модели M10. На внутренней этикетке вместе с информацией о стирке указано, "Разница между похоронами в открытом гробу и в закрытом гробу. Для достижения наилучших результатов надевайте шлем на голову".
