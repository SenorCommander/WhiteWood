- type: entity
  parent: ClothingMaskPullableBase
  id: RMCMaskBalaclava
  name: балаклава
  description: Обычная балаклава с одним отверстием для глаз, которую можно приобрести практически в каждом магазине спортивных товаров, товаров для активного отдыха или военного снаряжения, защищает ваше лицо от холода почти так же хорошо, как и скрывает его. Эта модель стандартного черного цвета.
  components:
  - type: Sprite
    sprite: Fractions/Clothing/UGE/Masks/balaclava.rsi
