- type: entity
  parent: ClothingMaskPullableBase
  id: CMMaskGas
  name: противогаз КМП-ОПЗ
  description: Закрывающая лицо маска, которую можно подключить к системе подачи воздуха. Очищает воздух от вредных газов.
  components:
  - type: Sprite
    sprite: Fractions/Clothing/UGE/Masks/gas.rsi
  - type: Clothing
    sprite: Fractions/Clothing/UGE/Masks/gas.rsi
  - type: BreathMask
  - type: IngestionBlocker
  - type: IdentityBlocker
  - type: Tag
    tags:
    - HamsterWearable
    - WhitelistChameleon
  - type: HideLayerClothing
    slots:
    - Snout
    hideOnToggle: true
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.95
        Slash: 0.95
        Piercing: 0.95
        Heat: 0.95

