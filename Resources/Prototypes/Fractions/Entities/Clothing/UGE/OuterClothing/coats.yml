- type: entity
  parent: [ClothingOuterStorageBase, ClothingOuterArmorHoS]
  id: CMCoatService
  name: офицерский китель ОПЗ
  description: Служебный китель, который обычно носят офицеры.
  components:
  - type: Sprite
    sprite: Fractions/Clothing/UGE/OuterClothing/Coats/service.rsi
  - type: Clothing
    sprite: Fractions/Clothing/UGE/OuterClothing/Coats/service.rsi
  - type: TemperatureProtection
    heatingCoefficient: 0.1
    coolingCoefficient: 0.1
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.9
        Slash: 0.9
        Piercing: 0.9
        Heat: 0.5
        Caustic: 0.5
  - type: Food
    requiresSpecialDigestion: true
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 20
        reagents:
        - ReagentId: Fiber
          Quantity: 20

- type: entity
