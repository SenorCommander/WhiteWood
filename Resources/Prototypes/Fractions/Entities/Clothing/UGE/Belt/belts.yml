  - type: Storage
    whitelist:
      tags:
        - CigPack
        - Taser
      components:
        - BallisticAmmoProvider
        - Ammo
    maxItemSize: Normal
    grid:
    - 0,0,5,1
  - type: ItemSlots
    slots:
      item:
        name: Holster
        whitelist:
          tags:
          - Sidearm

- type: entity
  parent: ClothingBeltStorageBase
  id: CMBeltMarine
  name: патронташ для боеприпасов ОПЗ
  description: M276 является стандартным снаряжением морпеха. Он состоит из модульного ремня с различными зажимами. Это стандартный вариант, предназначенный для операций по перевозке массовых боеприпасов.
  components:
  - type: Sprite
    sprite: Fractions/Clothing/UGE/Belt/marine.rsi
  - type: Clothing
    sprite: Fractions/Clothing/UGE/Belt/marine.rsi
  - type: Storage
    whitelist:
      tags:
        - CigPack
        - Taser
      components:
        - Stunbaton
        - FlashOnTrigger
        - SmokeOnTrigger
        - Flash
        - Handcuff
        - BallisticAmmoProvider
        - Ammo
  - type: ItemMapper
    mapLayers:
      flashbang:
        whitelist:
          components:
          - FlashOnTrigger
      stunbaton:
        whitelist:
          components:
          - Stunbaton
      tear_gas_grenade:
        whitelist:
          components:
          - SmokeOnTrigger
    sprite: Clothing/Belt/belt_overlay.rsi
  - type: Appearance

