- type: entity
  parent: Clothing
  id: SCPIDCard
  name: Карта Доступа ???
  description: Уровень допуска сотрудника Фонда соответствует максимальному уровню секретности информации, к которой он может получить доступ.
  noSpawn: true
  components:
  - type: Sprite
    sprite: Fractions/Objects/Misc/SCP Foundation/id_cards.rsi
  - type: Clothing
    slots:
    - idcard
    sprite: Fractions/Objects/Misc/SCP Foundation/id_cards.rsi
  - type: Item
    heldPrefix: default
  - type: Access
  - type: IdCard
  - type: StationRecordKeyStorage
  - type: Tag
    tags:
    - DoorBumpOpener

